version = "158.1"

[[instructions]]
family = "set"
variant = "set"
rust_name = "set"
emit = ["set", "$target", "$source"]
receiver = "target"
inputs = ["source"]
outputs = []

[[instructions]]
family = "op"
variant = "add"
rust_name = "op_add"
emit = ["op", "add", "$out", "$lhs", "$rhs"]
receiver = ""
inputs = ["lhs", "rhs"]
outputs = ["out"]

[[instructions]]
family = "op"
variant = "not"
rust_name = "op_not"
emit = ["op", "not", "$out", "$input", "0"]
receiver = ""
inputs = ["input"]
outputs = ["out"]
